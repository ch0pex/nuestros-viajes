# Despliegue automático en GitHub Pages: cada push a main compila y publica.
# Requisito (una sola vez): en el repo, Settings → Pages → Source: "GitHub Actions"
name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # El base se saca del nombre del repo, así funciona se llame como se llame
      - run: npm run build -- --base=/${{ github.event.repository.name }}/
      # Truco para que las rutas (/experiencia/...) funcionen al recargar
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
